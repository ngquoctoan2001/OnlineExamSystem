version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: onlineexam_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onlineexam_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - onlineexam_network

  adminer:
    image: adminer
    container_name: onlineexam_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - onlineexam_network

  redis:
    image: redis:7-alpine
    container_name: onlineexam_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - onlineexam_network

  minio:
    image: minio/minio:latest
    container_name: onlineexam_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - onlineexam_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  onlineexam_network:
    driver: bridge
